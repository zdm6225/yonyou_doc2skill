services:
  # MCP Server Service (HTTP mode)
  - type: web
    name: yonyou-doc2skill-mcp
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.mcp
    envVars:
      - key: MCP_PORT
        value: "8765"
      - key: PORT
        fromService:
          type: web
          name: yonyou-doc2skill-mcp
          property: port
    healthCheckPath: /health
    autoDeploy: true
